<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לעילוי נשמת - משניות</title>
    <link rel="stylesheet" href="style.css">
    <script src="mishnah_index.js"></script>
    <script src="mishnah_mappings.js"></script>
    <script src="niftar.js"></script>
    <script>
        // Init the app synchronously so the inner DOMContentLoaded listener in niftar.js registers in time
        if (window.runNiftarApp) {
            window.runNiftarApp(typeof mishnahIndex !== 'undefined' ? mishnahIndex : null);
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>משניות לעילוי נשמת</h1>
        </header>
        
        <div class="main-content">
            <!-- טופס הזנת שם הנפטר -->
            <div class="name-input-section">
                <div class="name-input-container">
                    <input type="text" id="niftar-name" placeholder="הכנס שם מלא של הנפטר/ת">
                    <button id="process-name-button">עבד שם</button>
                </div>
                
                <div id="name-letters-display" style="display: none;">
                    <div class="letters-header">
                        <h2>אותיות השם: <span id="processed-name"></span></h2>
</div>

                    <div id="letter-boxes" class="letter-boxes-container"></div>
                    
                    <div class="alphabet-section">
                        <div id="alphabet-buttons" class="alphabet-buttons-container"></div>
                </div>
                    
                    <div class="action-buttons">
                        <button id="random-select-button">בחר משניות אקראיות</button>
                        <button id="add-neshamah-button">הוסף משניות נשמ"ה</button>
                        <button id="clear-selections-button">נקה בחירות</button>
                        <button id="prepare-print-button">הכן להדפסה</button>
                </div>
                </div>
            </div>
            
            <!-- תצוגה של משנה שנבחרה -->
            <div class="mishnah-preview" style="display: none;">
                <div id="mishnayot-display" class="mishnah-content"></div>
            </div>
            
            <!-- רשימת משניות שנבחרו -->
            <div class="selected-mishnayot-section">
                <div class="section-header-row">
                    <h3>משניות שנבחרו</h3>
                    <button id="copy-selected" class="action-button copy-button" style="display: none;">העתק הכל לצילום קליפבורד</button>
                </div>
                <div id="selected-mishnayot-list" class="selected-mishnayot-list"></div>
            </div>
        </div>
        
        <!-- מודל בחירת משניות -->
        <div id="mishnah-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>בחר משנה לאות <span id="modal-letter"></span></h3>
                
                <div id="modal-preview" class="modal-preview" style="display: none;">
                    <div id="modal-preview-content">
                        <h4 id="modal-preview-title"></h4>
                        <div id="modal-preview-text"></div>
                        <div id="modal-preview-commentary"></div>
                    </div>
                </div>
                
                <div id="modal-mishnah-list" class="modal-mishnah-list"></div>
            
                <div class="modal-actions">
                    <label class="checkbox-container">
                        <input type="checkbox" id="show-bartenura-checkbox">
                        <span class="checkmark"></span>
                        הצג פירוש ברטנורא
                    </label>
                    <button id="modal-confirm-selection" class="select-button">בחר משנה זו</button>
                </div>
                </div>
        </div> 

        <!-- הודעות שגיאה/הצלחה -->
        <div id="error-message" class="error-message" style="display: none;"></div>
    </div>
    

</body>
</html>
