<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עורך הדפסה - משניות לעילוי נשמת</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* איפוס בסיסי לעמוד ההדפסה בלבד */
        body { margin: 0; padding: 0; background-color: #f4f6f9; font-family: 'Assistant', Arial, sans-serif; }
        
        /* סרגל כלים - מוצג רק למסך */
        .toolbar {
            position: sticky;
            top: 0;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            border-bottom: 2px solid #e0e0e0;
        }

        /* מעקף את style.css הגלובלי (button { color: white }) — רק על כפתורי העיצוב הבהירים */
        .toolbar button:not(.primary-btn):not(.back-btn) {
            background: whitesmoke !important;
            border: 1px solid #ccc !important;
            border-radius: 5px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s all;
            color: #1a237e !important;
        }

        .toolbar button:not(.primary-btn):not(.back-btn):hover {
            background: #e8eaf6 !important;
            border-color: #9fa8da !important;
            color: #0d1642 !important;
        }
        
        .toolbar .primary-btn { background: #3f51b5 !important; color: #fff !important; border-color: #3f51b5 !important; font-weight: bold; }
        .toolbar .primary-btn:hover { background: #303f9f !important; }
        
        .toolbar .back-btn { background: #f44336 !important; color: #fff !important; border-color: #f44336 !important; }
        .toolbar .back-btn:hover { background: #d32f2f !important; }

        .toolbar .sep { height: 30px; width: 1px; background: #ccc; }

        .toolbar-secondary {
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 8px;
            padding-bottom: 8px;
            border-top: 1px dashed #cfd8dc;
        }
        .toolbar-caption {
            font-size: 13px;
            color: #546e7a;
            font-weight: 600;
            width: 100%;
            text-align: center;
            margin-bottom: 4px;
        }
        .toolbar-caption-hint {
            font-size: 11px;
            font-weight: 400;
            color: #78909c;
            line-height: 1.35;
            margin-bottom: 8px;
        }
        .toolbar-secondary button {
            background: #eceff1 !important;
            border: 1px solid #b0bec5 !important;
            border-radius: 5px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #263238 !important;
        }
        .toolbar-secondary button:hover {
            background: #cfd8dc !important;
            border-color: #78909c !important;
        }

        /* קנבס עבודה דמוי נייר A4 */
        .a4-canvas {
            background-color: white;
            /* אינדיקציה חזותית לגבולות הדף (כל 297 מ"מ) רק במסך */
            background-image: linear-gradient(to bottom, transparent calc(297mm - 2px), #b0bec5 calc(297mm - 2px), #b0bec5 297mm);
            background-size: 100% 297mm;
            
            width: 210mm;
            min-height: 297mm;
            box-sizing: border-box;
            margin: 40px auto;
            padding: 20mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            font-family: 'David', 'Frank Ruhl Libre', serif;
            font-size: 16pt;
            line-height: 1.6;
            color: black;
            outline: none;
            direction: rtl;
            text-align: justify;
        }

        .a4-canvas h1 { text-align: center; margin-bottom: 5px; font-size: 26pt; }
        .a4-canvas h2 { text-align: center; font-size: 18pt; margin-bottom: 30px; font-weight: normal; }
        .a4-canvas .mishnah-block { margin-bottom: 25px; }
        .a4-canvas .mishnah-title { font-weight: bold; font-size: 18pt; margin-bottom: 10px; color: #000; text-decoration: underline; }
        .a4-canvas .bartenura-block { font-size: 13pt; color: #444; margin-top: 10px; padding-right: 15px; border-right: 3px solid #ccc; }
        .a4-canvas .print-extra-title { font-size: 16pt; color: #000; margin-top: 1em; text-align: center; font-weight: bold; }
        .a4-canvas .print-extra-body { font-size: 13pt; color: #222; text-align: justify; }
        .a4-canvas .verse-num { font-weight: bold; color: #37474f; margin-left: 0.25em; }

        /* מאפשר הסתרה דינאמית של הברטנורא */
        .a4-canvas.hide-bartenura .bartenura-block {
            display: none !important;
        }
        .a4-canvas .print-extra-insert { margin-top: 0.5em; }

        /* במצב הדפסה */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .toolbar { display: none !important; }
            .a4-canvas { 
                margin: 0; 
                padding: 0; 
                box-shadow: none; 
                border: none; 
                width: 100%; 
                min-height: auto; 
                background-image: none !important; /* ביטול הקו המפריד של הדפים בהדפסה האמיתית */
            }
        }

        /* מצב טעינה */
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 24px; color: #333; font-weight: bold;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: #3f51b5; animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- שכבת טעינה -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <span>...מכין משניות להדפסה</span>
    </div>

    <!-- סרגל כלים שיוצג רק על המסך -->
    <div class="toolbar no-print">
        <button class="back-btn" onclick="window.history.back()">↩ חזור לבחירה</button>
        <div class="sep"></div>
        <button onclick="document.execCommand('bold', false, null)"><b>B</b> מודגש</button>
        <button onclick="document.execCommand('italic', false, null)"><i>I</i> נטוי</button>
        <button onclick="document.execCommand('underline', false, null)"><u>U</u> קו תחתון</button>
        <div class="sep"></div>
        <button onclick="document.execCommand('justifyRight', false, null)">יישור לימין</button>
        <button onclick="document.execCommand('justifyCenter', false, null)">יישור למרכז</button>
        <button onclick="document.execCommand('justifyLeft', false, null)">יישור לשמאל</button>
        <div class="sep"></div>
        <button class="primary-btn" onclick="window.print()">🖨️ הדפס / שמור כ-PDF</button>
    </div>

    <div class="toolbar toolbar-secondary no-print">
        <span class="toolbar-caption">תוספות להדפסה (מתווספות לדף בלבד)</span>
        <span class="toolbar-caption toolbar-caption-hint">הסדר בדף נקבע לפי נוהג הקבורה — לא לפי סדר הלחיצות: תהילים על הקבר, קיט לפי שם, קיט מלא, אל מלא רחמים ויזכור</span>
        <button type="button" id="toggle-bart-btn" onclick="toggleBartenura()">📕 הסתר ברטנורא</button>
        <button type="button" onclick="window.printAppendTehillimCemetery && window.printAppendTehillimCemetery()">תהילים על הקבר</button>
        <button type="button" onclick="window.printAppendKit119ByName && window.printAppendKit119ByName()">קיט לפי שם הנפטר</button>
        <button type="button" onclick="window.printAppendKit119Full && window.printAppendKit119Full()">קיט מלא</button>
        <button type="button" onclick="window.printAppendElMalehYizkor && window.printAppendElMalehYizkor()">אל מלא רחמים ויזכור</button>
    </div>

    <!-- משטח העבודה נטו -->
    <div id="print-content" class="a4-canvas" contenteditable="true" spellcheck="false">
        <!-- התוכן יוזרק לפה באמצעות JavaScript -->
    </div>

    <script src="mishnah_mappings.js"></script>
    <script src="tehillim119_data.js"></script>
    <script src="print.js"></script>
    <script>
        function toggleBartenura() {
            const canvas = document.getElementById('print-content');
            const btn = document.getElementById('toggle-bart-btn');
            const isHidden = canvas.classList.toggle('hide-bartenura');
            localStorage.setItem('printHideBartenura', isHidden ? '1' : '0');
            btn.innerHTML = isHidden ? '📖 הצג ברטנורא' : '📕 הסתר ברטנורא';
        }
    </script>
</body>
</html>
