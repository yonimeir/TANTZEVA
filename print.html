<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עורך הדפסה - משניות לעילוי נשמת</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@400;700&display=swap');

        /* איפוס בסיסי לעמוד ההדפסה בלבד */
        body { margin: 0; padding: 0; background-color: #f4f6f9; font-family: 'Assistant', Arial, sans-serif; }
        
        .print-toolbar-shell {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1500;
        }

        /* סרגל כלים - מוצג רק למסך */
        .toolbar {
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        /* מעקף את style.css הגלובלי (button { color: white }) — רק על כפתורי העיצוב הבהירים */
        .toolbar button:not(.primary-btn):not(.back-btn) {
            background: whitesmoke !important;
            border: 1px solid #ccc !important;
            border-radius: 5px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s all;
            color: #1a237e !important;
        }

        .toolbar button:not(.primary-btn):not(.back-btn):hover {
            background: #e8eaf6 !important;
            border-color: #9fa8da !important;
            color: #0d1642 !important;
        }
        .toolbar button.toggle-btn[aria-pressed="true"] {
            background: #18345d !important;
            border-color: #18345d !important;
            color: #ffffff !important;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.2);
        }
        .toolbar button.toggle-btn[aria-pressed="false"]::before {
            content: "○ ";
            font-weight: bold;
        }
        .toolbar button.toggle-btn[aria-pressed="true"]::before {
            content: "● ";
            font-weight: bold;
        }
        
        .toolbar .primary-btn { background: #3f51b5 !important; color: #fff !important; border-color: #3f51b5 !important; font-weight: bold; }
        .toolbar .primary-btn:hover { background: #303f9f !important; }
        
        .toolbar .back-btn { background: #f44336 !important; color: #fff !important; border-color: #f44336 !important; }
        .toolbar .back-btn:hover { background: #d32f2f !important; }

        .toolbar .sep { height: 30px; width: 1px; background: #ccc; }
        .toolbar-control {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #37474f;
            font-size: 13px;
            font-weight: 600;
        }
        .toolbar-control select,
        .toolbar-control input {
            margin: 0;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            background: #fff;
            color: #263238;
            padding: 6px 8px;
            font-size: 13px;
        }
        .toolbar-control input[type="number"] {
            width: 64px;
        }
        .toolbar-control input[type="text"] {
            width: 150px;
        }
        #print-font-family {
            min-width: 150px;
        }

        .toolbar-secondary {
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 8px;
            padding-bottom: 8px;
            border-top: 1px dashed #cfd8dc;
        }
        .toolbar-caption {
            font-size: 13px;
            color: #546e7a;
            font-weight: 600;
            width: 100%;
            text-align: center;
            margin-bottom: 4px;
        }
        .toolbar-caption-hint {
            font-size: 11px;
            font-weight: 400;
            color: #78909c;
            line-height: 1.35;
            margin-bottom: 8px;
        }
        .toolbar-secondary button {
            background: #eceff1 !important;
            border: 1px solid #b0bec5 !important;
            border-radius: 5px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #263238 !important;
        }
        .toolbar-secondary button:hover {
            background: #cfd8dc !important;
            border-color: #78909c !important;
        }

        /* קנבס עבודה דמוי נייר A4 */
        .a4-canvas {
            --print-font-family: 'David', 'Frank Ruhl Libre', serif;
            --print-base-size: 16pt;
            background-color: white;
            /* אינדיקציה חזותית לגבולות הדף (כל 297 מ"מ) רק במסך */
            background-image: linear-gradient(to bottom, transparent calc(297mm - 2px), #b0bec5 calc(297mm - 2px), #b0bec5 297mm);
            background-size: 100% 297mm;
            
            width: 210mm;
            min-height: 297mm;
            box-sizing: border-box;
            margin: 40px auto;
            padding: 20mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            font-family: var(--print-font-family);
            font-size: var(--print-base-size);
            line-height: 1.6;
            color: black;
            outline: none;
            direction: rtl;
            text-align: justify;
        }

        .a4-canvas h1,
        .a4-canvas h2,
        .a4-canvas h3,
        .a4-canvas .mishnah-title,
        .a4-canvas .print-extra-title {
            font-family: var(--print-font-family) !important;
        }
        .a4-canvas h1 { text-align: center; margin-bottom: 5px; font-size: calc(var(--print-base-size) * 1.6); }
        .a4-canvas h2 { text-align: center; font-size: calc(var(--print-base-size) * 1.15); margin-bottom: 30px; font-weight: normal; }
        .a4-canvas .mishnah-block { margin-bottom: 25px; }
        .a4-canvas .mishnah-title { font-weight: bold; font-size: calc(var(--print-base-size) * 1.15); margin-bottom: 10px; color: #000; text-decoration: underline; }
        .a4-canvas .mishnah-content { font-family: var(--print-font-family); font-size: var(--print-base-size); line-height: 1.8; }
        .a4-canvas .bartenura-block { font-size: calc(var(--print-base-size) * 0.82); color: #444; margin-top: 10px; padding-right: 15px; border-right: 3px solid #ccc; }
        .a4-canvas .print-extra-title { font-size: var(--print-base-size); color: #000; margin-top: 1em; text-align: center; font-weight: bold; }
        .a4-canvas .print-extra-body { font-size: calc(var(--print-base-size) * 0.92); color: #222; text-align: justify; }
        .a4-canvas .verse-num { font-weight: bold; color: #37474f; margin-left: 0.25em; }

        /* מאפשר הסתרה דינאמית של הברטנורא */
        .a4-canvas.hide-bartenura .bartenura-block {
            display: none !important;
        }
        .a4-canvas .print-extra-insert { margin-top: 0.5em; }

        /* במצב הדפסה */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .toolbar,
            .print-toolbar-shell { display: none !important; }
            .a4-canvas { 
                margin: 0; 
                padding: 0; 
                box-shadow: none; 
                border: none; 
                width: 100%; 
                min-height: auto; 
                background-image: none !important; /* ביטול הקו המפריד של הדפים בהדפסה האמיתית */
            }
        }

        /* מצב טעינה */
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 24px; color: #333; font-weight: bold;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: #3f51b5; animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- שכבת טעינה -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <span>...מכין משניות להדפסה</span>
    </div>

    <div class="print-toolbar-shell no-print">
    <!-- סרגל כלים שיוצג רק על המסך -->
    <div class="toolbar">
        <button class="back-btn" onclick="window.history.back()">↩ חזור לבחירה</button>
        <div class="sep"></div>
        <button type="button" class="toggle-btn command-toggle" data-command="bold" aria-pressed="false" onclick="window.printToggleCommand && window.printToggleCommand('bold')"><b>B</b> מודגש</button>
        <button type="button" class="toggle-btn command-toggle" data-command="italic" aria-pressed="false" onclick="window.printToggleCommand && window.printToggleCommand('italic')"><i>I</i> נטוי</button>
        <button type="button" class="toggle-btn command-toggle" data-command="underline" aria-pressed="false" onclick="window.printToggleCommand && window.printToggleCommand('underline')"><u>U</u> קו תחתון</button>
        <div class="sep"></div>
        <button type="button" class="toggle-btn command-toggle" data-command="justifyRight" aria-pressed="false" onclick="window.printToggleCommand && window.printToggleCommand('justifyRight')">יישור לימין</button>
        <button type="button" class="toggle-btn command-toggle" data-command="justifyCenter" aria-pressed="false" onclick="window.printToggleCommand && window.printToggleCommand('justifyCenter')">יישור למרכז</button>
        <button type="button" class="toggle-btn command-toggle" data-command="justifyLeft" aria-pressed="false" onclick="window.printToggleCommand && window.printToggleCommand('justifyLeft')">יישור לשמאל</button>
        <div class="sep"></div>
        <label class="toolbar-control">
            סוג גופן
            <select id="print-font-family" onchange="window.printApplyFontFamily && window.printApplyFontFamily(this.value)">
                <option value="'David', 'Frank Ruhl Libre', serif" style="font-family: 'David', 'Frank Ruhl Libre', serif;">דוד / ספר</option>
                <option value="'Frank Ruhl Libre', 'David', serif" style="font-family: 'Frank Ruhl Libre', 'David', serif;">פרנק ריהל</option>
                <option value="'Assistant', 'Heebo', Arial, sans-serif" style="font-family: 'Assistant', 'Heebo', Arial, sans-serif;">אסיסטנט</option>
                <option value="Arial, sans-serif" style="font-family: Arial, sans-serif;">Arial</option>
            </select>
        </label>
        <label class="toolbar-control">
            גודל
            <input id="print-font-size" type="number" min="10" max="32" step="1" value="16" oninput="window.printApplyFontSize && window.printApplyFontSize(this.value)" onchange="window.printApplyFontSize && window.printApplyFontSize(this.value)">
        </label>
        <div class="sep"></div>
        <button class="primary-btn" onclick="window.print()">🖨️ הדפס / שמור כ-PDF</button>
        <button type="button" class="primary-btn" onclick="window.printDownloadWord && window.printDownloadWord()">⬇ הורד Word</button>
    </div>

    <div class="toolbar toolbar-secondary">
        <span class="toolbar-caption">תוספות להדפסה (מתווספות לדף בלבד)</span>
        <span class="toolbar-caption toolbar-caption-hint">הסדר בדף נקבע לפי נוהג הקבורה — לא לפי סדר הלחיצות: תהילים על הקבר, קיט לפי שם, קיט מלא, אל מלא רחמים ויזכור</span>
        <label class="toolbar-control">
            שם האב
            <input id="niftar-father-name" type="text" placeholder="למשל: יעקב" onchange="window.printSaveFatherName && window.printSaveFatherName(this.value)">
        </label>
        <button type="button" id="toggle-bart-btn" class="toggle-btn" aria-pressed="true" onclick="window.toggleBartenura && window.toggleBartenura()">ברטנורא: דלוק</button>
        <button type="button" id="toggle-cemetery-btn" class="toggle-btn" aria-pressed="false" onclick="window.printAppendTehillimCemetery && window.printAppendTehillimCemetery()">תהילים על הקבר</button>
        <button type="button" id="toggle-kit119name-btn" class="toggle-btn" aria-pressed="false" onclick="window.printAppendKit119ByName && window.printAppendKit119ByName()">קיט לפי שם הנפטר</button>
        <button type="button" id="toggle-kit119full-btn" class="toggle-btn" aria-pressed="false" onclick="window.printAppendKit119Full && window.printAppendKit119Full()">קיט מלא</button>
        <button type="button" id="toggle-elmalehyizkor-btn" class="toggle-btn" aria-pressed="false" onclick="window.printAppendElMalehYizkor && window.printAppendElMalehYizkor()">אל מלא רחמים ויזכור</button>
    </div>
    </div>

    <!-- משטח העבודה נטו -->
    <div id="print-content" class="a4-canvas" contenteditable="true" spellcheck="false">
        <!-- התוכן יוזרק לפה באמצעות JavaScript -->
    </div>

    <script src="mishnah_mappings.js"></script>
    <script src="tehillim119_data.js"></script>
    <script src="print.js"></script>
</body>
</html>
